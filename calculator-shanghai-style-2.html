<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Shanghai Calculator — Dark Pro</title><style>body{font-family:Inter,Arial;margin:0;background:#0b1220;color:#e8eefc}.wrap{max-width:980px;margin:24px auto;padding:0 16px}.card{background:#111b2f;border:1px solid #253453;border-radius:12px;padding:16px;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:12px;color:#9bb0d4}input{width:100%;padding:10px;border:1px solid #324668;border-radius:8px;background:#0d1728;color:#e8eefc}.kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.box{background:#0f2038;border:1px solid #2f4f7a;border-radius:10px;padding:10px}.box b{display:block;font-size:12px;color:#9db5db}.box span{font-size:22px;font-weight:700;color:#7ec4ff}@media(max-width:900px){.grid,.kpi{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><h1>Style 2 · Dark Pro</h1><p>Shanghai Salary, Benefits & Tax Calculator</p></div><div class="card"><div class="grid"><div><label>Gross Salary</label><input id="gross" value="30000" type="number"></div><div><label>Special Deductions</label><input id="special" value="0" type="number"></div><div><label>Employee Contribution %</label><input id="empRate" value="17.5" type="number" step="0.01"></div><div><label>Employer Contribution %</label><input id="erRate" value="33.16" type="number" step="0.01"></div><div><label>Base Floor</label><input id="floor" value="7310" type="number"></div><div><label>Base Ceiling</label><input id="ceil" value="36549" type="number"></div></div></div><div class="card kpi"><div class="box"><b>Employee Contributions</b><span id="emp"></span></div><div class="box"><b>IIT</b><span id="iit"></span></div><div class="box"><b>Take-home</b><span id="net"></span></div><div class="box"><b>Employer Contributions</b><span id="er"></span></div><div class="box"><b>Total Employer Cost</b><span id="cost"></span></div><div class="box"><b>Taxable Income</b><span id="taxable"></span></div></div></div><script>const ids=['gross','special','empRate','erRate','floor','ceil'];ids.forEach(i=>document.getElementById(i).addEventListener('input',calc));const m=n=>'¥'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});function iit(t){if(t<=0)return 0;const b=[[3000,.03,0],[12000,.1,210],[25000,.2,1410],[35000,.25,2660],[55000,.3,4410],[80000,.35,7160],[1e18,.45,15160]];for(const x of b){if(t<=x[0])return t*x[1]-x[2]}return 0}function calc(){let g=+gross.value||0,s=+special.value||0,e=+empRate.value||0,r=+erRate.value||0,f=+floor.value||0,c=+ceil.value||0;base=Math.max(f,Math.min(g,c));empv=base*e/100;erv=base*r/100;tax=Math.max(0,g-empv-5000-s);iitv=Math.max(0,iit(tax));netv=g-empv-iitv;costv=g+erv;emp.textContent=m(empv);er.textContent=m(erv);iit.textContent=m(iitv);net.textContent=m(netv);cost.textContent=m(costv);taxable.textContent=m(tax)}calc();</script></body></html>
