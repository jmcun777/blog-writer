<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">China Termination: Cost-Risk Matrix (Foreign Employer Lens)</text>
  <text x="60" y="108" font-family="Arial" font-size="20" fill="#334155">X轴：执行速度压力  |  Y轴：合规/争议风险</text>

  <line x1="180" y1="700" x2="1260" y2="700" stroke="#64748b" stroke-width="3"/>
  <line x1="180" y1="700" x2="180" y2="180" stroke="#64748b" stroke-width="3"/>

  <text x="1110" y="742" font-family="Arial" font-size="20" fill="#475569">速度压力 ↑</text>
  <text x="70" y="210" transform="rotate(-90 70,210)" font-family="Arial" font-size="20" fill="#475569">风险 ↑</text>

  <rect x="220" y="220" width="460" height="220" rx="14" fill="#fee2e2" stroke="#ef4444"/>
  <text x="245" y="260" font-family="Arial" font-size="24" font-weight="700" fill="#991b1b">高风险区：快但证据弱</text>
  <text x="245" y="300" font-family="Arial" font-size="20" fill="#7f1d1d">- 路径置信度 &lt;80%</text>
  <text x="245" y="332" font-family="Arial" font-size="20" fill="#7f1d1d">- 证据完整度 &lt;90%</text>
  <text x="245" y="364" font-family="Arial" font-size="20" fill="#7f1d1d">- 口径一致性 ≠100%</text>
  <text x="245" y="396" font-family="Arial" font-size="20" fill="#7f1d1d">动作：暂停争议项释放</text>

  <rect x="740" y="220" width="480" height="220" rx="14" fill="#ffedd5" stroke="#f97316"/>
  <text x="765" y="260" font-family="Arial" font-size="24" font-weight="700" fill="#9a3412">中风险区：快且部分可控</text>
  <text x="765" y="300" font-family="Arial" font-size="20" fill="#9a3412">- 路径已定，证据补齐中</text>
  <text x="765" y="332" font-family="Arial" font-size="20" fill="#9a3412">- 本周期仅处理无争议项</text>
  <text x="765" y="364" font-family="Arial" font-size="20" fill="#9a3412">- 48小时内完成地方确认</text>

  <rect x="740" y="500" width="480" height="170" rx="14" fill="#dcfce7" stroke="#22c55e"/>
  <text x="765" y="540" font-family="Arial" font-size="24" font-weight="700" fill="#166534">低风险区：稳态可释放</text>
  <text x="765" y="578" font-family="Arial" font-size="20" fill="#166534">四闸门通过：Route / Evidence / Alignment / Closure</text>
  <text x="765" y="610" font-family="Arial" font-size="20" fill="#166534">动作：可发布、可审计、可复核</text>

  <text x="60" y="790" font-family="Arial" font-size="16" fill="#64748b">Generated infographic for article anchor: Cost & risk frames</text>
</svg>