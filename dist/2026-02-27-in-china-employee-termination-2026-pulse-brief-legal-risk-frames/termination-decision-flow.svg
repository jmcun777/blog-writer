<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">China Termination Decision Flow (Legal-First)</text>
  <text x="60" y="108" font-family="Arial" font-size="20" fill="#334155">四闸门：任何闸门失败即停止最终释放</text>

  <rect x="110" y="170" width="280" height="120" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="218" font-family="Arial" font-size="24" font-weight="700" fill="#1e3a8a">Gate 1</text>
  <text x="135" y="252" font-family="Arial" font-size="20" fill="#1e3a8a">Route 合法路径确认</text>

  <rect x="450" y="170" width="280" height="120" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="475" y="218" font-family="Arial" font-size="24" font-weight="700" fill="#312e81">Gate 2</text>
  <text x="475" y="252" font-family="Arial" font-size="20" fill="#312e81">Evidence 证据映射</text>

  <rect x="790" y="170" width="280" height="120" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="815" y="218" font-family="Arial" font-size="24" font-weight="700" fill="#581c87">Gate 3</text>
  <text x="815" y="252" font-family="Arial" font-size="20" fill="#581c87">Alignment 三方口径一致</text>

  <rect x="1110" y="170" width="220" height="120" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1130" y="218" font-family="Arial" font-size="24" font-weight="700" fill="#166534">Gate 4</text>
  <text x="1130" y="252" font-family="Arial" font-size="20" fill="#166534">Closure 归档闭环</text>

  <line x1="390" y1="230" x2="450" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="730" y1="230" x2="790" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1070" y1="230" x2="1110" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="390" width="540" height="180" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="145" y="435" font-family="Arial" font-size="26" font-weight="700" fill="#991b1b">Fail Path（任一闸门失败）</text>
  <text x="145" y="475" font-family="Arial" font-size="22" fill="#7f1d1d">1) 停止最终发放</text>
  <text x="145" y="510" font-family="Arial" font-size="22" fill="#7f1d1d">2) 进入例外通道并指定责任人</text>
  <text x="145" y="545" font-family="Arial" font-size="22" fill="#7f1d1d">3) 48小时内完成补证/复核计划</text>

  <rect x="740" y="390" width="560" height="180" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="765" y="435" font-family="Arial" font-size="26" font-weight="700" fill="#166534">Pass Path（四闸门通过）</text>
  <text x="765" y="475" font-family="Arial" font-size="22" fill="#166534">1) 发布一致口径文档</text>
  <text x="765" y="510" font-family="Arial" font-size="22" fill="#166534">2) 执行受控支付与社保离场处理</text>
  <text x="765" y="545" font-family="Arial" font-size="22" fill="#166534">3) 完成可检索归档与复盘</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="60" y="860" font-family="Arial" font-size="16" fill="#64748b">Generated infographic for article anchor: Operational flags</text>
</svg>