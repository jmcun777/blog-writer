<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Space Shooter - Mobile</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;display:flex;justify-content:center}
    .wrap{max-width:860px;width:100%;padding:12px}
    canvas{width:100%;max-width:420px;height:auto;background:radial-gradient(circle at 50% 20%,#0b1b3a,#030712);border:2px solid #334155;border-radius:8px;display:block;margin:0 auto}
    .hud{display:flex;justify-content:space-between;max-width:420px;margin:8px auto;font-weight:700}
    .controls{max-width:420px;margin:10px auto 0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    button{padding:14px 10px;border:1px solid #475569;background:#1e293b;color:#fff;border-radius:8px;font-size:18px}
    .wide{grid-column:span 3;background:#2563eb}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud"><div>Score: <span id="score">0</span></div><div>Lives: <span id="lives">3</span></div></div>
    <canvas id="game" width="420" height="640"></canvas>
    <div class="controls">
      <button id="left">◀</button>
      <button id="shoot">🔥</button>
      <button id="right">▶</button>
      <button id="start" class="wide">Start / Restart</button>
    </div>
  </div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let running=false, score=0, lives=3, stars=[];
const player={x:210,y:580,w:34,h:24,speed:5,cooldown:0};
let bullets=[], enemies=[], enemyTimer=0, leftHeld=false, rightHeld=false;

function reset(){score=0;lives=3;bullets=[];enemies=[];enemyTimer=0;player.x=210;player.cooldown=0;running=true;updateHud();}
function updateHud(){document.getElementById('score').textContent=score;document.getElementById('lives').textContent=lives;}
function spawnStars(){stars=[...Array(70)].map(()=>({x:Math.random()*420,y:Math.random()*640,s:Math.random()*2+1}));}

function shoot(){if(player.cooldown<=0){bullets.push({x:player.x,y:player.y-14,w:4,h:10,v:8});player.cooldown=10;}}
function spawnEnemy(){const w=28,h=20; enemies.push({x:Math.random()*(420-w),y:-h,w,h,v:2+Math.random()*1.5});}

function rectHit(a,b){return a.x-a.w/2 < b.x+b.w && a.x+a.w/2 > b.x && a.y-a.h/2 < b.y+b.h && a.y+a.h/2 > b.y;}

function update(){
  if(!running) return;
  if(leftHeld) player.x-=player.speed;
  if(rightHeld) player.x+=player.speed;
  player.x=Math.max(player.w/2,Math.min(420-player.w/2,player.x));
  if(player.cooldown>0) player.cooldown--;

  bullets=bullets.filter(b=>{b.y-=b.v; return b.y>-20;});
  enemies.forEach(e=>e.y+=e.v);
  enemies=enemies.filter(e=>e.y<680);

  enemyTimer--; if(enemyTimer<=0){spawnEnemy(); enemyTimer=35+Math.random()*25|0;}

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(b.x>b.x-1 && b.x>e.x && b.x<e.x+e.w && b.y>e.y && b.y<e.y+e.h){
        enemies.splice(i,1); bullets.splice(j,1); score+=10; updateHud(); break;
      }
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const p={x:player.x,y:player.y,w:player.w,h:player.h};
    const er={x:e.x+e.w/2,y:e.y+e.h/2,w:e.w,h:e.h};
    if(rectHit(p,er) || e.y+e.h>640){
      enemies.splice(i,1); lives--; updateHud();
      if(lives<=0){running=false;}
    }
  }
}

function drawShip(x,y,w,h,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x,y-h/2);ctx.lineTo(x-w/2,y+h/2);ctx.lineTo(x+w/2,y+h/2);ctx.closePath();ctx.fill();}
function draw(){
  ctx.clearRect(0,0,420,640);
  stars.forEach(s=>{s.y+=s.s*0.6; if(s.y>640)s.y=0; ctx.fillStyle='#94a3b8'; ctx.fillRect(s.x,s.y,s.s,s.s);});
  bullets.forEach(b=>{ctx.fillStyle='#facc15';ctx.fillRect(b.x-2,b.y,4,10);});
  enemies.forEach(e=>{ctx.fillStyle='#ef4444';ctx.fillRect(e.x,e.y,e.w,e.h);ctx.fillStyle='#111827';ctx.fillRect(e.x+6,e.y+6,4,4);ctx.fillRect(e.x+18,e.y+6,4,4);});
  drawShip(player.x,player.y,player.w,player.h,'#22d3ee');
  if(!running){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(40,250,340,120);
    ctx.fillStyle='#fff';ctx.font='28px Arial';ctx.fillText('Game Over',130,300);
    ctx.font='18px Arial';ctx.fillText('Tap Start / Restart',125,335);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);} 
function hold(btn, on, off){btn.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});btn.addEventListener('touchend',off);btn.addEventListener('mousedown',on);btn.addEventListener('mouseup',off);btn.addEventListener('mouseleave',off);} 

hold(document.getElementById('left'), ()=>leftHeld=true, ()=>leftHeld=false);
hold(document.getElementById('right'), ()=>rightHeld=true, ()=>rightHeld=false);
const shootBtn=document.getElementById('shoot'); shootBtn.addEventListener('touchstart',e=>{e.preventDefault();shoot();},{passive:false}); shootBtn.addEventListener('click',shoot);
document.getElementById('start').addEventListener('click',reset);
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')leftHeld=true; if(e.key==='ArrowRight')rightHeld=true; if(e.key===' '||e.key==='ArrowUp')shoot(); if(e.key==='Enter')reset();});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')leftHeld=false; if(e.key==='ArrowRight')rightHeld=false;});

spawnStars(); draw(); loop();
</script>
</body>
</html>
